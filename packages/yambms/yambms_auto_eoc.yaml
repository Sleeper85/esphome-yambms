substitutions:
  # +--------------------------------------+
  # | Use the settings below with caution  |
  # +--------------------------------------+
  # Alpha value for the exponential moving average filter.
  required_charge_current_alpha: '0.25'
  # Filter delay in minutes. The charge current will not be updated more often than this value.
  # This is to prevent the charge current from fluctuating too much.
  required_charge_current_filter_delay: '3'

esphome:
  on_boot:
    - priority: -100.0
      then:
        - lambda: |-
            id(yambms${yambms_id}_var_auto_ccl_functions_count)++;
    
switch:
  - platform: template
    name: "Automatic EOC Current"
    id: yambms${yambms_id}_switch_auto_eoc
    device_id: yambms_yambms${yambms_id}
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    entity_category: config

number:
  - platform: template
    name: "Auto EOC Target Hour"
    id: yambms${yambms_id}_auto_eoc_target_hour
    device_id: yambms_yambms${yambms_id}
    step: 1
    min_value: 12
    max_value: 23
    restore_value: true
    mode: "${yambms_input_number_mode}"
    initial_value: 18
    unit_of_measurement: h
    icon: mdi:clock-digital
    optimistic: true
    entity_category: config

  - platform: template
    name: "Auto EOC Target Minute"
    id: yambms${yambms_id}_auto_eoc_target_min
    device_id: yambms_yambms${yambms_id}
    step: 15
    min_value: 0
    max_value: 45
    restore_value: true
    mode: "${yambms_input_number_mode}"
    initial_value: 0
    unit_of_measurement: m
    icon: mdi:clock-digital
    optimistic: true
    entity_category: config

  - platform: template
    name: "Auto EOC Correction"
    id: yambms${yambms_id}_auto_eoc_correction
    device_id: yambms_yambms${yambms_id}
    step: 1
    min_value: -20
    max_value: 20
    restore_value: true
    mode: "${yambms_input_number_mode}"
    initial_value: 0
    unit_of_measurement: '%'
    icon: mdi:arrow-oscillating
    optimistic: true
    entity_category: config

  - platform: template
    name: "Auto EOC Capacity Modifier"
    id: yambms${yambms_id}_auto_eoc_modifier
    device_id: yambms_yambms${yambms_id}
    step: 1
    min_value: -10
    max_value: 0
    restore_value: true
    mode: "${yambms_input_number_mode}"
    initial_value: -2
    unit_of_measurement: '%'
    icon: mdi:battery-arrow-down
    optimistic: true
    entity_category: config

  - platform: template
    name: "Auto EOC Increase Stop Hours"
    id: yambms${yambms_id}_auto_eoc_stop_hours
    device_id: yambms_yambms${yambms_id}
    step: 0.5
    min_value: 0
    max_value: 4
    restore_value: true
    mode: "${yambms_input_number_mode}"
    initial_value: 1
    unit_of_measurement: 'h'
    icon: mdi:timer-stop
    optimistic: true
    entity_category: config

  - platform: template
    name: "Auto EOC Increase Stop SoC"
    id: yambms${yambms_id}_auto_eoc_stop_soc
    device_id: yambms_yambms${yambms_id}
    step: 1
    min_value: 50
    max_value: 100
    restore_value: true
    mode: "${yambms_input_number_mode}"
    initial_value: 97
    unit_of_measurement: '%'
    icon: mdi:battery-charging-80
    optimistic: true
    entity_category: config

text_sensor:
  # +--------------------------------------+
  # | Auto EOC Status                     |
  # +--------------------------------------+
  - platform: template
    name: "Auto EOC Status"
    id: yambms${yambms_id}_auto_eoc_status
    device_id: yambms_yambms${yambms_id}
    update_interval: never
    icon: mdi:information-outline
    entity_category: diagnostic

sensor:
  # +--------------------------------------+
  # | Auto EOC Charging                    |
  # +--------------------------------------+
    # Filter charging current to smooth out fluctuations
    # The value will be updated every 3 minutes
  - platform: template
    name: "Auto EOC Current"
    id: yambms${yambms_id}_auto_eoc_charging_current_filtered
    device_id: yambms_yambms${yambms_id}
    unit_of_measurement: A
    device_class: current
    filters:
      - exponential_moving_average:
          alpha: ${required_charge_current_alpha}
          send_every: ${required_charge_current_filter_delay}
          send_first_at: 1
      - round: 0

interval:
  - interval: ${yambms_update_interval}
    then:
      # +------------------------------------------+
      # | Auto EOC Charge Current Limit            |
      # +------------------------------------------+
      - lambda: |-
          // Check if we are in the correct step
          int cc_step = id(yambms${yambms_id}_var_charge_current_step);
          if ((cc_step < 1) || (cc_step >= (id(yambms${yambms_id}_var_auto_ccl_functions_count) + 1))) {
            return;
          }

          ESP_LOGD("yambms_debug", "Entering Auto EOC...");

          // Check if enabled
          if (!id(yambms${yambms_id}_switch_auto_eoc).state || 
              !id(yambms${yambms_id}_battery_capacity).has_state() ||
              !id(yambms${yambms_id}_battery_capacity_remaining).has_state() ||
              !id(yambms${yambms_id}_max_charge_current).has_state()) {
            // Auto EOC Charging disabled
            id(yambms${yambms_id}_var_auto_eoc) = 0;
            id(yambms${yambms_id}_auto_eoc_charging_current_filtered).publish_state(NAN);
            id(yambms${yambms_id}_auto_eoc_status).publish_state("Stop: Disabled");
            id(yambms${yambms_id}_var_charge_current_step)++;
            return;
          }

          // Check if Float is active
          if (id(yambms${yambms_id}_charging_instruction).state == "Float") {
            id(yambms${yambms_id}_var_auto_eoc) = 0;
            id(yambms${yambms_id}_auto_eoc_charging_current_filtered).publish_state(NAN);
            id(yambms${yambms_id}_auto_eoc_status).publish_state("Stop: Float");
            id(yambms${yambms_id}_var_charge_current_step)++;
            return;
          }

          // Update in 60s intervals only
          static uint32_t last_execution_ms = 0;
          uint32_t current_ms = millis();

          if ((current_ms - last_execution_ms) < 60000) {
            id(yambms${yambms_id}_var_charge_current_step)++;
            return;
          }

          last_execution_ms = current_ms;

          // Check if current time is valid
          const auto current_time = id(my_time).now();
          if (!current_time.is_valid()) {
            ESP_LOGW("yambms_auto_eoc", "Time not valid");
            id(yambms${yambms_id}_var_auto_eoc) = 0;
            id(yambms${yambms_id}_auto_eoc_charging_current_filtered).publish_state(NAN);
            id(yambms${yambms_id}_auto_eoc_status).publish_state("Stop: Time not valid");
            id(yambms${yambms_id}_var_charge_current_step)++;
            return;
          }

          // Get target time
          const int target_hour = id(yambms${yambms_id}_auto_eoc_target_hour).state;
          const int target_minute = id(yambms${yambms_id}_auto_eoc_target_min).state;

          // Create target timestamp
          auto target_time = current_time;
          target_time.hour = target_hour;
          target_time.minute = target_minute;
          target_time.second = 0;
          target_time.recalc_timestamp_local();

          // Calculate hours left until target time
          const float hours_left = (target_time.timestamp - current_time.timestamp) / 3600.0;

          if (hours_left <= 0) {
            id(yambms${yambms_id}_var_auto_eoc) = 0;
            id(yambms${yambms_id}_auto_eoc_charging_current_filtered).publish_state(NAN);
            id(yambms${yambms_id}_auto_eoc_status).publish_state("Stop: Target time passed");
            id(yambms${yambms_id}_var_charge_current_step)++;
            return;
          }

          // Check if we stop increasing the charge current
          bool stop_increasing = false;
          if (id(yambms${yambms_id}_battery_soc).has_state() && (id(yambms${yambms_id}_battery_soc).state >= id(yambms${yambms_id}_auto_eoc_stop_soc).state)) {
            ESP_LOGD("yambms_auto_eoc", "Stopping charge current increase, SoC is above threshold");
            stop_increasing = true;
          } else if (hours_left <= id(yambms${yambms_id}_auto_eoc_stop_hours).state) {
            ESP_LOGD("yambms_auto_eoc", "Stopping charge current increase, hours left is below threshold");
            stop_increasing = true;
          }

          // Get battery capacity
          auto battery_capacity = id(yambms${yambms_id}_battery_capacity).state;

          // Apply negative capacity modifier
          battery_capacity += (battery_capacity * (id(yambms${yambms_id}_auto_eoc_modifier).state / 100.0));
        
          // Check if Auto SoC Limit is active
          int auto_soc_limit = 0;
          if (id(yambms${yambms_id}_switch_auto_soc_limit).state && 
              id(yambms${yambms_id}_auto_soc_limit_status).has_state()) {
            // Check status, if Run, remove Auto SoC limit difference from battery capacity
            if (id(yambms${yambms_id}_auto_soc_limit_status).state.starts_with("Run")) {
              auto_soc_limit = id(yambms${yambms_id}_auto_soc_limit).state;
              battery_capacity = (battery_capacity * auto_soc_limit) / 100.0;
              ESP_LOGD("yambms_auto_eoc", "Auto SoC Limit is active, adjusted battery capacity");
            } else {
              ESP_LOGD("yambms_auto_eoc", "Auto SoC Limit is active but not running, not adjusting battery capacity");
            }
          }

          // Calculate missing capacity
          auto capacity_required = battery_capacity - id(yambms${yambms_id}_battery_capacity_remaining).state;
          if (capacity_required < 0) {
            capacity_required = 0;
          }

          // Get active charge current, this will be our maximum charge current
          float auto_limit = std::min({
                  id(yambms${yambms_id}_var_auto_ccl), 
                  id(yambms${yambms_id}_var_auto_temperature_ccl)
                });

          float charge_current = round(id(yambms${yambms_id}_max_charge_current).state + auto_limit);

          // Calculate required charge current
          float required_charge_current = capacity_required / hours_left;

          // Apply charge current correction factor
          const float correction_factor = (id(yambms${yambms_id}_auto_eoc_correction).state / 100.0) + 1.0;
          required_charge_current *= correction_factor;

          // If the required charge current higher than the maximum charge current, return 0 to indicate
          // that there is no solution
          float return_value = 0;
          if (required_charge_current >= charge_current) {
            required_charge_current = 0;
            return_value = NAN;
            id(yambms${yambms_id}_auto_eoc_status).publish_state("Stop: Current above limit");
          } else {
            // The value is valid, return it
            return_value = required_charge_current;

            // Check if filtered charging current is available
            if (id(yambms${yambms_id}_auto_eoc_charging_current_filtered).has_state()) {
              const float filtered_charge_current = id(yambms${yambms_id}_auto_eoc_charging_current_filtered).state;

              // Check if current is increasing and we should stop
              if (stop_increasing && (required_charge_current > filtered_charge_current)) {
                // Return previous filtered charge current
                return_value = filtered_charge_current;
                id(yambms${yambms_id}_auto_eoc_status).publish_state("Run: Current increase stopped");
              } else if (auto_soc_limit) {
                // Update status to running with Auto SoC Limit
                id(yambms${yambms_id}_auto_eoc_status).publish_state("Run: Auto SoC Limit " + std::to_string(auto_soc_limit) + "%");
              } else {
                // Update status to running
                id(yambms${yambms_id}_auto_eoc_status).publish_state("Run");
              }

              // Use filtered charge current for calculations
              required_charge_current = filtered_charge_current;
            }
          }

          // Limit required charge current to maximum charge current
          if ((required_charge_current > 0.0f) && (required_charge_current < charge_current)) {
            // Calculate negative difference to charge current
            id(yambms${yambms_id}_var_auto_eoc) = round(required_charge_current - charge_current);
          } else {
            id(yambms${yambms_id}_var_auto_eoc) = 0;
          }

          id(yambms${yambms_id}_auto_eoc_charging_current_filtered).publish_state(return_value);

          id(yambms${yambms_id}_var_charge_current_step)++;
