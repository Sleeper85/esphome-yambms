#--------------------------------------------------------------------------------------------
# Auto CCL Current Taper
#
# Purpose:
#   Taper requested charge current from knee to bulk voltage. At first bulk touch, drop CCL
#   to balance current. Zero after EOC (var_eoc).
#   Owns Charging Offset: while active (at/above knee) and before bulk, add it to Bulk
#   CVL via var_auto_custom_cvl; clear at bulk / EOC. Do not use with Auto CVL enabled
#   (set Charging Offset to 0, or leave Auto CVL off) — CT does not reference Auto CVL IDs.
#
# Contract with yambms_core.yaml:
#   - Participates in Auto CCL STEP pipeline
#   - Writes: id(yambms${yambms_id}_var_auto_custom_ccl)  (<= 0)
#   - Writes: id(yambms${yambms_id}_var_auto_custom_cvl)  (+charging_offset while active
#     before bulk, else 0). Requires core Bulk CVL to sum var_auto_custom_cvl.
#   - Advances pipeline via: id(yambms${yambms_id}_var_charge_current_step)++
#
#--------------------------------------------------------------------------------------------

esphome:
  on_boot:
    # Registration in the Auto CCL pipeline
    - priority: -100.0
      then:
        - lambda: |-
            id(yambms${yambms_id}_var_auto_ccl_functions_count)++;   // Registration

    # Knee Voltage limits based on cell count and battery chemistry
    # Priority 550 : runs right after the YamBMS chemistry block (600)
    # which sets the var_cell_* globals used below.
    # Use the substitution (not cell_count.state): the sensor is often still
    # NaN at this priority, and casting NaN→int produces garbage limits/values.
    - priority: 550.0
      then:
        - lambda: |-
            const int cell_count = ${yambms_cell_count};
            const float v_min = round(cell_count * id(yambms${yambms_id}_var_cell_nominal_v) * 10) / 10;
            const float v_max = round(cell_count * id(yambms${yambms_id}_var_cell_max_charge_v) * 10) / 10;

            id(yambms${yambms_id}_number_auto_ccl_ct_knee_v).traits.set_min_value(v_min);
            id(yambms${yambms_id}_number_auto_ccl_ct_knee_v).traits.set_max_value(v_max);

            // Initialize/clamp the value inside the pack window
            // (the static initial_value is 16S LFP), default = cell_min_charge × cells
            const float knee_v = id(yambms${yambms_id}_number_auto_ccl_ct_knee_v).state;
            if (isnan(knee_v) || (knee_v < v_min) || (knee_v > v_max))
              id(yambms${yambms_id}_number_auto_ccl_ct_knee_v).publish_state(round(cell_count * id(yambms${yambms_id}_var_cell_min_charge_v) * 10) / 10);

switch:
  - platform: template
    id: yambms${yambms_id}_switch_auto_ccl_ct
    device_id: yambms_yambms${yambms_id}
    name: "Auto CCL CT"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    entity_category: config

number:
  # Knee / activation voltage (pack)
  # Min/max are updated at boot from cell count × chemistry (see on_boot priority 550).
  - platform: template
    id: yambms${yambms_id}_number_auto_ccl_ct_knee_v
    device_id: yambms_yambms${yambms_id}
    name: "Auto CCL CT Knee Voltage"
    unit_of_measurement: V
    device_class: voltage
    min_value: 54.2 # LFP placeholder; overwritten at boot
    max_value: 56.0 # LFP placeholder; overwritten at boot
    step: 0.1
    mode: ${yambms_input_number_mode}
    restore_value: true
    optimistic: true
    initial_value: 54.4 # LFP 16S placeholder; clamped at boot if out of range
    entity_category: config
    icon: mdi:sine-wave

  # Knee / activation C-rate (× capacity → CCL at knee)
  - platform: template
    id: yambms${yambms_id}_number_auto_ccl_ct_knee_c_rate
    device_id: yambms_yambms${yambms_id}
    name: "Auto CCL CT Knee C-Rate"
    unit_of_measurement: "C"
    max_value: 0.5
    min_value: 0.05
    step: 0.005
    mode: ${yambms_input_number_mode}
    restore_value: true
    optimistic: true
    initial_value: 0.125
    entity_category: config
    icon: mdi:current-dc

  # Bulk / end-of-curve C-rate (× capacity → CCL at bulk)
  - platform: template
    id: yambms${yambms_id}_number_auto_ccl_ct_bulk_c_rate
    device_id: yambms_yambms${yambms_id}
    name: "Auto CCL CT Bulk C-Rate"
    unit_of_measurement: "C"
    max_value: 0.1
    min_value: 0.0
    step: 0.005
    mode: ${yambms_input_number_mode}
    restore_value: true
    optimistic: true
    initial_value: 0.03
    entity_category: config
    icon: mdi:current-dc

  # Balance current (A) while latched at bulk. Non-zero so inverters that ignore 0 A still see a limit.
  - platform: template
    id: yambms${yambms_id}_number_auto_ccl_ct_balance_a
    device_id: yambms_yambms${yambms_id}
    name: "Auto CCL CT Balance Current"
    unit_of_measurement: A
    device_class: current
    min_value: 0
    max_value: 50
    step: 1
    mode: ${yambms_input_number_mode}
    restore_value: true
    optimistic: true
    initial_value: 2
    entity_category: config
    icon: mdi:current-dc

  # Curve shape: 1=linear, >1=quicker drop then longer tail
  # Range 0.5–2.0 (below 1 delays taper / sharpens near bulk; above 1 drops faster early)
  - platform: template
    id: yambms${yambms_id}_number_auto_ccl_ct_curve_exp
    device_id: yambms_yambms${yambms_id}
    name: "Auto CCL CT Curve Exp"
    max_value: 2.0
    min_value: 0.5
    step: 0.1
    mode: ${yambms_input_number_mode}
    restore_value: true
    optimistic: true
    initial_value: 1.0
    entity_category: config
    icon: mdi:chart-bell-curve

  # Extra Bulk CVL while CT is active (knee → bulk). Cleared at bulk. IR/sense stays on Charger Offset.
  - platform: template
    id: yambms${yambms_id}_number_auto_ccl_ct_charging_offset_v
    device_id: yambms_yambms${yambms_id}
    name: "Auto CCL CT Charging Offset"
    unit_of_measurement: V
    device_class: voltage
    min_value: 0
    max_value: 1
    step: 0.1
    mode: ${yambms_input_number_mode}
    restore_value: true
    optimistic: true
    initial_value: 0.0
    entity_category: config
    icon: mdi:battery-charging

sensor:
  # Pack V for taper math — 10-sample SMA; keeps CCL from amplifying raw V noise
  # If it’s twitchy, increase window_size; if too sluggish, lower it.
  - platform: copy
    source_id: yambms${yambms_id}_total_voltage
    id: yambms${yambms_id}_auto_ccl_ct_voltage
    device_id: yambms_yambms${yambms_id}
    name: "Auto CCL CT Voltage"
    accuracy_decimals: 3
    entity_category: diagnostic
    icon: mdi:sine-wave
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 1

  - platform: template
    name: "Auto CCL CT Delta"
    id: yambms${yambms_id}_auto_ccl_ct_delta
    device_id: yambms_yambms${yambms_id}
    unit_of_measurement: A
    accuracy_decimals: 0
    update_interval: never
    entity_category: diagnostic
    icon: mdi:current-dc
    lambda: 'return id(yambms${yambms_id}_var_auto_custom_ccl);'

  # Applied charging offset on Bulk CVL (0 or +offset). Entities-card explanation for CVL > Bulk.
  - platform: template
    name: "Auto CCL CT CVL Offset"
    id: yambms${yambms_id}_auto_ccl_ct_cvl_offset
    device_id: yambms_yambms${yambms_id}
    unit_of_measurement: V
    device_class: voltage
    accuracy_decimals: 1
    update_interval: never
    icon: mdi:sine-wave
    lambda: 'return id(yambms${yambms_id}_var_auto_custom_cvl);'

  # C-rate × capacity
  - platform: template
    name: "Auto CCL CT Knee Amps"
    id: yambms${yambms_id}_auto_ccl_ct_knee_amps
    device_id: yambms_yambms${yambms_id}
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    accuracy_decimals: 0
    update_interval: ${yambms_update_interval}
    entity_category: diagnostic
    icon: mdi:current-dc
    lambda: |-
      return roundf(id(yambms${yambms_id}_battery_capacity).state
                  * id(yambms${yambms_id}_number_auto_ccl_ct_knee_c_rate).state);

  - platform: template
    name: "Auto CCL CT Bulk Amps"
    id: yambms${yambms_id}_auto_ccl_ct_bulk_amps
    device_id: yambms_yambms${yambms_id}
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    accuracy_decimals: 0
    update_interval: ${yambms_update_interval}
    entity_category: diagnostic
    icon: mdi:current-dc
    lambda: |-
      return roundf(id(yambms${yambms_id}_battery_capacity).state
                  * id(yambms${yambms_id}_number_auto_ccl_ct_bulk_c_rate).state);

interval:
  - interval: ${yambms_update_interval}
    then:
      - lambda: |-
          //--------------------------------------------------------------------
          // Internal state
          //--------------------------------------------------------------------
          static bool  active       = false;   // At/above knee this session
          static bool  bulk_latched = false;   // Pack has touched bulk this session
          static float I_anchor     = NAN;     // CCL at knee (left end of curve)

          //--------------------------------------------------------------------
          // Gate #1: Correct Auto CCL step
          //--------------------------------------------------------------------
          const int cc_step = id(yambms${yambms_id}_var_charge_current_step);
          const int n_funcs = id(yambms${yambms_id}_var_auto_ccl_functions_count);
          if (cc_step < 1 || cc_step > n_funcs) {
            return;
          }

          //--------------------------------------------------------------------
          // Gate #2: Feature enabled?
          //--------------------------------------------------------------------
          if (!id(yambms${yambms_id}_switch_auto_ccl_ct).state) {
            active = false;
            bulk_latched = false;
            id(yambms${yambms_id}_var_auto_custom_ccl) = 0.0f;
            id(yambms${yambms_id}_var_auto_custom_cvl) = 0.0f;
            id(yambms${yambms_id}_auto_ccl_ct_delta).publish_state(0.0f);
            id(yambms${yambms_id}_auto_ccl_ct_cvl_offset).publish_state(0.0f);
            id(yambms${yambms_id}_var_charge_current_step)++;
            return;
          }

          //--------------------------------------------------------------------
          // Inputs
          //--------------------------------------------------------------------
          const float cap_ah    = id(yambms${yambms_id}_battery_capacity).state;
          const float I_max     = id(yambms${yambms_id}_max_charge_current).state;
          const float knee_c    = id(yambms${yambms_id}_number_auto_ccl_ct_knee_c_rate).state;
          const float bulk_c    = id(yambms${yambms_id}_number_auto_ccl_ct_bulk_c_rate).state;
          const float curve_exp = id(yambms${yambms_id}_number_auto_ccl_ct_curve_exp).state;
          const float I_knee    = cap_ah * knee_c;
          const float I_bulk    = cap_ah * bulk_c;
          const float I_balance = id(yambms${yambms_id}_number_auto_ccl_ct_balance_a).state;  // CCL while latched at bulk
          const float V_knee    = id(yambms${yambms_id}_number_auto_ccl_ct_knee_v).state;
          const float V_bulk    = id(yambms${yambms_id}_bulk_voltage).state;
          // Prefer SMA pack V; fall back to raw until the filter has a sample
          const float V_pack    = id(yambms${yambms_id}_auto_ccl_ct_voltage).has_state()
              ? id(yambms${yambms_id}_auto_ccl_ct_voltage).state
              : id(yambms${yambms_id}_total_voltage).state;
          const bool  eoc_done  = id(yambms${yambms_id}_var_eoc);
          constexpr float V_hyst = 0.2f;                                    // release hysteresis below knee

          float I_target = I_max;
          float delta    = 0.0f;

          //--------------------------------------------------------------------
          // Gate #3: Knee must sit below bulk (with hysteresis margin).
          // bulk_voltage is runtime-adjustable, so boot traits alone can't enforce this.
          //--------------------------------------------------------------------
          if (V_knee >= (V_bulk - V_hyst)) {
            active = false;
            bulk_latched = false;
            id(yambms${yambms_id}_var_auto_custom_ccl) = 0.0f;
            id(yambms${yambms_id}_var_auto_custom_cvl) = 0.0f;
            id(yambms${yambms_id}_auto_ccl_ct_delta).publish_state(0.0f);
            id(yambms${yambms_id}_auto_ccl_ct_cvl_offset).publish_state(0.0f);
            id(yambms${yambms_id}_var_charge_current_step)++;
            return;
          }

          //--------------------------------------------------------------------
          // Session: activate at knee; stay active until 0.2 V below knee
          //--------------------------------------------------------------------
          if (!active && V_pack >= V_knee) {
            active = true;
            bulk_latched = false;                                           // new session
            // Left end: min(knee amps, current CCL) — never start above Auto EOC (etc.)
            const float I_ccl = id(yambms${yambms_id}_requested_charge_current).has_state()
                ? id(yambms${yambms_id}_requested_charge_current).state
                : I_max;
            I_anchor = fminf(I_knee, I_ccl);
          } else if (active && V_pack <= (V_knee - V_hyst)) {
            active = false;
            bulk_latched = false;
          } else if (active && !bulk_latched && V_pack >= V_bulk) {
            bulk_latched = true;                                            // sudden drop to I_balance
          }

          //--------------------------------------------------------------------
          // Desired charge current
          //--------------------------------------------------------------------
          if (active) {
            if (eoc_done) {
              I_target = 0.0f;                                              // EOC → CCL = 0
            } else if (bulk_latched) {
              I_target = I_balance;                                         // at bulk → balance current
            } else {
              float p = (V_pack - V_knee) / (V_bulk - V_knee);              // 0 at knee → 1 at bulk
              p = fmaxf(0.0f, fminf(p, 1.0f));                              // below knee (hyst band): hold I_anchor
              const float curve = powf(1.0f - p, curve_exp);
              // Never let the curve end above the left end (I_anchor may be
              // min(knee amps, current CCL); bulk C-rate must not invert the taper).
              const float I_end = fminf(I_bulk, I_anchor);
              I_target = I_end + (I_anchor - I_end) * curve;                // curve ends at I_end at bulk
            }
            delta = fminf(0.0f, I_target - I_max);
          }

          id(yambms${yambms_id}_var_auto_custom_ccl) = delta;
          id(yambms${yambms_id}_auto_ccl_ct_delta).publish_state(delta);

          //--------------------------------------------------------------------
          // Bulk CVL: add Charging Offset while active, before bulk
          // Core sums: bulk + charger_offset + auto_cvl + custom_cvl
          // (No Auto CVL switch check — that package is optional and may be absent.)
          //--------------------------------------------------------------------
          float cvl_delta = 0.0f;
          if (active && !bulk_latched && !eoc_done) {
            cvl_delta = id(yambms${yambms_id}_number_auto_ccl_ct_charging_offset_v).state;
          }
          id(yambms${yambms_id}_var_auto_custom_cvl) = cvl_delta;
          id(yambms${yambms_id}_auto_ccl_ct_cvl_offset).publish_state(cvl_delta);

          // Pass the baton
          id(yambms${yambms_id}_var_charge_current_step)++;
