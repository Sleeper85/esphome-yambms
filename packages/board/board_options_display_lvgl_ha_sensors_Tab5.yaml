# +--------------------------------------------------------------------------+
# | Home Assistant Sensor Bindings for 1280x720 LVGL Display (Tab5 design)
# +--------------------------------------------------------------------------+
# | Updates LVGL widgets using Home Assistant entity data.
# | For use on a standalone display device (not running YamBMS itself).
# |
# | Required substitutions:
# |   `yambms_name` - HA entity prefix (default: yambms_1)
# |   `device_name` - HA device name (default: yambms)
# |
# | Requires: board_options_display_lvgl_design_1280x720_Tab5.yaml (LVGL layout)
# |
# +--------------------------------------------------------------------------+

substitutions:
  device_name: 'yambms'
  yambms_name: 'yambms_1'

# +--------------------------------------+
# | Display Timeout                      |
# +--------------------------------------+

number:
  - platform: template
    name: "Display timeout"
    optimistic: true
    id: display_timeout
    unit_of_measurement: "s"
    initial_value: 300
    restore_value: true
    min_value: 10
    max_value: 300
    step: 5
    mode: box
    entity_category: config

# +--------------------------------------+
# | Time (RTC and Home Assistant sync)   |
# +--------------------------------------+

time:
  - platform: rx8130
    id: rx8130_time
    update_interval: 30 min
    on_time:
      - cron: '/10 * * * * *'
        then:
          - lvgl.label.update:
              id: time_text
              text:
                format: "%02d:%02d"
                args: [ 'id(rx8130_time).now().hour', 'id(rx8130_time).now().minute']

  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - rx8130.write_time:
            id: rx8130_time

esphome:
  on_boot:
    - then:
        rx8130.read_time:

# +--------------------------------------+
# | API Status                           |
# +--------------------------------------+

api:
  on_client_connected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.show: lbl_hastatus
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.hide: lbl_hastatus

# +--------------------------------------+
# | HA Text Sensors                      |
# +--------------------------------------+

text_sensor:
  - platform: homeassistant
    id: yambms_charging_status
    entity_id: sensor.${yambms_name}_charging_status
    internal: true
    on_value:
      - lvgl.label.update:
          id: charging_status_text
          text: !lambda |-
            return x;

# +--------------------------------------+
# | HA Binary Sensors                    |
# +--------------------------------------+

binary_sensor:
  - platform: homeassistant
    id: yambms_inverter_status
    entity_id: binary_sensor.${device_name}_inverter_communication_status
    internal: true
    on_state_change:
      - lvgl.label.update:
          id: lbl_INV
          text_color: !lambda |-
            if (x) {
              return lv_color_hex(0x13BF13);
            }
            return lv_color_hex(0xBF1327);

  - platform: homeassistant
    id: yambms_esp_status
    entity_id: binary_sensor.${device_name}_esp32_online_status
    internal: true
    on_state_change:
      - lvgl.label.update:
          id: lbl_ESP
          text_color: !lambda |-
            if (x) {
              return lv_color_hex(0x13BF13);
            }
            return lv_color_hex(0xBF1327);

  - platform: homeassistant
    id: yambms_discharging_allowed
    entity_id: binary_sensor.${yambms_name}_discharging_allowed
    internal: true
    on_state_change:
      - lvgl.label.update:
          id: discharging_allowed_text
          text: !lambda |-
            if (x) {
              return "Allowed";
            }
            return "Disabled";
          text_color: !lambda |-
            if (x) {
              return lv_color_hex(0x13BF13);
            }
            return lv_color_hex(0xBF1327);

  - platform: homeassistant
    id: yambms_charging_allowed
    entity_id: binary_sensor.${yambms_name}_charging_allowed
    internal: true
    on_state_change:
      - lvgl.label.update:
          id: charging_allowed_text
          text: !lambda |-
            if (x) {
              return "Allowed";
            }
            return "Disabled";
          text_color: !lambda |-
            if (x) {
              return lv_color_hex(0x13BF13);
            }
            return lv_color_hex(0xBF1327);

# +--------------------------------------+
# | HA Numeric Sensors                   |
# +--------------------------------------+

sensor:
  - platform: homeassistant
    id: yambms_current
    entity_id: sensor.${yambms_name}_current
    internal: true
    on_value:
      - lvgl.indicator.update:
          id: current_needle
          value: !lambda return x;
      - lvgl.label.update:
          id: current_text
          text:
            format: "%.1f A"
            args: [ 'x' ]
      - lvgl.label.update:
          id: overall_state
          text: !lambda |-
            if (x > 0) {
                return "Charging";
            } else if (x == 0) {
                return "Standby";
            } else if (x < 0) {
                return "Discharging";
            }
            return "Unknown";

  - platform: homeassistant
    id: yambms_power
    entity_id: sensor.${yambms_name}_power
    internal: true
    filters:
      - multiply: 0.001
    on_value:
      - lvgl.indicator.update:
          id: power_needle
          value: !lambda return x;
      - lvgl.label.update:
          id: power_text
          text:
            format: "%.2f kW"
            args: [ 'x' ]

  - platform: homeassistant
    id: yambms_voltage
    entity_id: sensor.${yambms_name}_total_voltage
    internal: true
    on_value:
      - lvgl.label.update:
          id: voltage_text
          text:
            format: "%.2fv"
            args: [ 'x' ]

  - platform: homeassistant
    id: yambms_delta
    entity_id: sensor.${yambms_name}_delta_cell_voltage
    internal: true
    on_value:
      - lvgl.label.update:
          id: delta_voltage_text
          text:
            format: "%.0f mV"
            args: [ 'x * 1000.0f' ]

  - platform: homeassistant
    id: yambms_alarming
    entity_id: sensor.${yambms_name}_bms_in_alarm
    internal: true
    on_value:
      - lvgl.label.update:
          id: bms_alarming_text
          text:
            format: "%.0f"
            args: [ 'x' ]
          text_color: !lambda |-
            if (x) {
              return lv_color_hex(0xBF1327);
            }
            return lv_color_hex(0x13BF13);

  - platform: homeassistant
    id: yambms_bms_count
    entity_id: sensor.${yambms_name}_bms_count
    internal: true

  - platform: homeassistant
    id: yambms_bms_combined
    entity_id: sensor.${yambms_name}_bms_combined
    internal: true
    on_value:
      - lvgl.label.update:
          id: combined_bms_text
          text:
            format: "%.0f of %.0f"
            args: [ 'x', 'id(yambms_bms_count).state']

  - platform: homeassistant
    id: yambms_battery_capacity
    entity_id: sensor.${yambms_name}_battery_capacity
    internal: true

  - platform: homeassistant
    id: yambms_capacity_remaining
    entity_id: sensor.${yambms_name}_capacity_remaining
    internal: true
    on_value:
      - lvgl.label.update:
          id: capacity_text
          text:
            format: "%.0f of %.0fAh"
            args: [ 'x', 'id(yambms_battery_capacity).state']

  - platform: homeassistant
    id: yambms_battery_percentage
    entity_id: sensor.${yambms_name}_battery_soc
    internal: true
    on_value:
      - lvgl.label.update:
          id: soc_text
          text:
            format: "%.0f%%"
            args: [ 'x' ]
      - lvgl.obj.update:
          id: battery_fill_soc
          height: !lambda 'return (int)(x * 4);'
          bg_color: !lambda |-
            if (x > 80) return lv_color_hex(0x00CC00); // green
            if (x > 20) return lv_color_hex(0xFFAA00); // yellow
            return lv_color_hex(0xFF0000);              // red
