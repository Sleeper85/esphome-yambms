  - platform: homeassistant
    entity_id: sensor.${bat_charge_now}
    id: ha_bat_charge_now
    on_value:
      then:
        - lambda: |-
            static uint32_t last_dur_bat = 0;
            static bool last_is_charge_bat = true;

            char b[16]; snprintf(b, 16, "%.0f W", x);
            lv_label_set_text(id(lbl_bat_charge_now), b);
            float chg  = x;
            float dchg = id(ha_bat_discharge_now).state;
            float power = std::max(chg, dchg);
            bool is_charge = (chg >= dchg);
            if (power < 1) {
              lv_obj_add_flag(id(dot_bat), LV_OBJ_FLAG_HIDDEN);
              last_dur_bat = 0;
            } else {
              lv_obj_clear_flag(id(dot_bat), LV_OBJ_FLAG_HIDDEN);
              float ratio = std::min(power / (float)${anim_battery_power_max}, 1.0f);
              uint32_t dur = (uint32_t)(${anim_duration_max} - ratio * (${anim_duration_max} - ${anim_duration_min}));

              bool direction_changed = (is_charge != last_is_charge_bat);
              bool speed_changed = (abs((int32_t)dur - (int32_t)last_dur_bat) > 200);

              if (direction_changed || speed_changed) {
                last_dur_bat = dur;
                last_is_charge_bat = is_charge;
                // Charge: junction→battery (left→right 395→562)
                // Discharge: battery→junction (right→left 562→395)
                int32_t from_x = is_charge ? 395 : 562;
                int32_t to_x   = is_charge ? 562 : 395;
                lv_anim_exec_xcb_t cb = [](void* obj, int32_t v){ lv_obj_set_x((lv_obj_t*)obj, v); };
                lv_anim_del(id(dot_bat), NULL);
                lv_anim_t a; lv_anim_init(&a);
