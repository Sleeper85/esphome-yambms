# +---------------------------------------------------------+
# | Boot: initialize Solar and Home dots                    |
# +---------------------------------------------------------+

esphome:
  on_boot:
    priority: -200
    then:
      - lambda: |-
          // Dots hidden by default
          lv_obj_add_flag(id(dot_solar), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(dot_home),  LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(dot_grid),  LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(dot_bat),   LV_OBJ_FLAG_HIDDEN);

interval:
  - interval: 30s
    then:
      - lambda: |-
          auto t = id(my_time).now();
          if (t.is_valid())
          {
            const char* days[] = {"Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"};
            char buf_date[20];
            snprintf(buf_date, 20, "%s %d", days[t.day_of_week - 1], t.day_of_month);
            lv_label_set_text(id(lbl_date), buf_date);

            char buf_time[6];
            snprintf(buf_time, 6, "%02d:%02d", t.hour, t.minute);
            lv_label_set_text(id(lbl_clock), buf_time);
          }

# +---------------------------------------------------------+
# | Sensor bindings                                         |
# +---------------------------------------------------------+

sensor:

  # ── PV ────────────────────────────────────────────────────
  - platform: homeassistant
    entity_id: sensor.${pv_power_now}
    id: ha_pv_power_now
    on_value:
      then:
        - lambda: |-
            static uint32_t last_dur_solar = 0;

            char b[16]; snprintf(b, 16, "%.0f W", x);
            lv_label_set_text(id(lbl_pv_now), b);

            if (x < 1) {
              lv_obj_add_flag(id(dot_solar), LV_OBJ_FLAG_HIDDEN);
              last_dur_solar = 0;
            } else {
              lv_obj_clear_flag(id(dot_solar), LV_OBJ_FLAG_HIDDEN);
              float ratio = std::min(x / (float)${anim_pv_power_max}, 1.0f);
              uint32_t dur = (uint32_t)(${anim_duration_max} - ratio * (${anim_duration_max} - ${anim_duration_min}));

              bool speed_changed = (abs((int32_t)dur - (int32_t)last_dur_solar) > 200);

              if (speed_changed) {
                last_dur_solar = dur;
                lv_anim_exec_xcb_t cb = [](void* obj, int32_t v){ lv_obj_set_y((lv_obj_t*)obj, v); };
                lv_anim_del(id(dot_solar), NULL);
                lv_anim_t a; lv_anim_init(&a);
                lv_anim_set_var(&a, id(dot_solar));
                lv_anim_set_exec_cb(&a, cb);
                lv_anim_set_values(&a, 106, 186);
                lv_anim_set_time(&a, dur);
                lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
                lv_anim_set_repeat_delay(&a, 0);
                lv_anim_start(&a);
              }
            }

  - platform: homeassistant
    entity_id: sensor.${pv_energy_today}
    id: ha_pv_energy_today
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_pv_today
            text: !lambda 'char b[20]; snprintf(b,20,"Today: %.2f kWh",x); return b;'

  # ── GRID ──────────────────────────────────────────────────
  - platform: homeassistant
    entity_id: sensor.${grid_import_now}
    id: ha_grid_import_now
    on_value:
      then:
        - lambda: |-
            static uint32_t last_dur_grid_import = 0;
            static bool last_is_import_grid_import = true;

            char b[16]; snprintf(b, 16, "%.0f W", x);
            lv_label_set_text(id(lbl_grid_import_now), b);
            float imp = x;
            float exp = id(ha_grid_export_now).state;
            // Net power: positive=import, negative=export
            float net = imp - exp;
            char bn[16]; snprintf(bn, 16, "%.0f W", net);
            lv_label_set_text(id(lbl_grid_net_now), bn);
            lv_color_t nc = (net > 10) ? lv_color_hex(0xe17055)
                          : (net < -10) ? lv_color_hex(0x00b894)
                          : lv_color_hex(0xffffff);
            lv_obj_set_style_text_color(id(lbl_grid_net_now), nc, 0);
            // Dot animation
            float power = std::max(imp, exp);
            bool is_import = (imp >= exp);
            if (power < 1) {
              lv_obj_add_flag(id(dot_grid), LV_OBJ_FLAG_HIDDEN);
              last_dur_grid_import = 0;
            } else {
              lv_obj_clear_flag(id(dot_grid), LV_OBJ_FLAG_HIDDEN);
              float ratio = std::min(power / (float)${anim_grid_power_max}, 1.0f);
              uint32_t dur = (uint32_t)(${anim_duration_max} - ratio * (${anim_duration_max} - ${anim_duration_min}));

              bool direction_changed = (is_import != last_is_import_grid_import);
              bool speed_changed = (abs((int32_t)dur - (int32_t)last_dur_grid_import) > 200);

              if (direction_changed || speed_changed) {
                last_dur_grid_import = dur;
                last_is_import_grid_import = is_import;
                int32_t from_x = is_import ? 232 : 395;
                int32_t to_x   = is_import ? 395 : 232;
                lv_anim_exec_xcb_t cb = [](void* obj, int32_t v){ lv_obj_set_x((lv_obj_t*)obj, v); };
                lv_anim_del(id(dot_grid), NULL);
                lv_anim_t a; lv_anim_init(&a);
                lv_anim_set_var(&a, id(dot_grid));
                lv_anim_set_exec_cb(&a, cb);
                lv_anim_set_values(&a, from_x, to_x);
                lv_anim_set_time(&a, dur);
                lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
                lv_anim_set_repeat_delay(&a, 0);
                lv_anim_start(&a);
              }
            }

  - platform: homeassistant
    entity_id: sensor.${grid_import_today}
    id: ha_grid_import_today
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_grid_import_today
            text: !lambda 'char b[16]; snprintf(b,16,"%.2f kWh",x); return b;'

  - platform: homeassistant
    entity_id: sensor.${grid_export_now}
