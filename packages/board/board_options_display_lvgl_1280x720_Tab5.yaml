# +--------------------------------------------------------------------------+
# | LVGL Layout for 1280x720 displays (Tab5 design)
# +--------------------------------------------------------------------------+
# | Pure LVGL layout: styles, pages, widgets, fonts, images.
# | No sensor bindings — those are provided by separate sensor packages:
# |   - board_options_display_lvgl_1280x720_Tab5_esphome_sensors.yaml
# |   - board_options_display_lvgl_1280x720_Tab5_ha_sensors.yaml
# |
# | Widget IDs exposed for sensor binding:
# |   Labels: overall_state, voltage_text, delta_voltage_text,
# |           charging_status_text, capacity_text, combined_bms_text,
# |           bms_alarming_text, soc_text, discharging_allowed_text,
# |           charging_allowed_text, current_text, current_name,
# |           power_text, power_name, lbl_hastatus, time_text,
# |           lbl_INV, lbl_ESP
# |   Meters: current_meter (needle: current_needle),
# |           power_meter (needle: power_needle)
# |   Battery: battery_fill_soc (pure LVGL, no images)
# |
# +--------------------------------------------------------------------------+

# +--------------------------------------+
# | Fonts                                |
# +--------------------------------------+

font:
  - file: "gfonts://Roboto"
    id: roboto_12
    size: 12
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_15
    size: 15
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_20
    size: 20
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_25
    size: 25
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_30
    size: 30
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_35
    size: 35
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_40
    size: 40
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_45
    size: 45
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_65
    size: 65
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_75
    size: 75
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto_85
    size: 85
    bpp: 4

# +--------------------------------------+
# | LVGL Configuration                   |
# +--------------------------------------+

lvgl:
  byte_order: little_endian
  color_depth: 16
  buffer_size: 100%
  bg_color: 0x000000 # black background
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  style_definitions:
    - id: footer
      bg_color: 0x393B3B
      bg_opa: COVER
      border_opa: TRANSP
      radius: 15
      opa: 80%
      pad_all: 0
      pad_row: 0
      pad_column: 0
      text_color: 0xFFFFFF
      text_font: montserrat_26
      width: 60%
      height: 50
    - id: header
      bg_opa: TRANSP
      border_opa: TRANSP
      pad_all: 0
      pad_row: 0
      pad_column: 0
      text_color: 0xFFFFFF
      width: 100%
      height: 50
    - id: data_box
      bg_color: 0x393B3B
      shadow_width: 5
      border_opa: TRANSP
      height: 100
      width: 90%
      radius: 15
      pad_all: 10
      pad_right: 20
      pad_bottom: 5
      pad_row: 0
      pad_column: 0
      text_color: 0xFFFFFF
    - id: gauge_box
      bg_color: 0x393B3B
      border_opa: TRANSP
      height: 370
      width: 370
      radius: 15
      pad_all: 10
      pad_row: 0
      pad_column: 0
      text_color: 0xFFFFFF
  pages:
    - id: main_page
      bg_color: 0x000000
      scrollbar_mode: "OFF"
      widgets:
      # Left column - data boxes
      - obj:
          height: 700
          width: 500
          align: LEFT_MID
          border_width: 0
          pad_all: 0
          bg_opa: TRANSP
          radius: 15
          layout:
            type: flex
            pad_row: 10
            flex_flow: ROW_WRAP
            flex_align_main: center
            flex_align_cross: start
            flex_align_track: center
          widgets:
          - obj:
              styles: data_box
              align: TOP_LEFT
              widgets:
              - label:
                  text_font: roboto_20
                  text: "Overall State"
                  text_color: 0x9C9C9C
                  align: TOP_LEFT
              - label:
                  id: overall_state
                  text_font: roboto_45
                  text: "Standby"
                  text_color: 0xFFFFFF
                  align: BOTTOM_RIGHT
          - obj:
              styles: data_box
              align: TOP_LEFT
              width: 44%
              widgets:
              - label:
                  text_font: roboto_20
                  text: "Voltage"
                  text_color: 0x9C9C9C
                  align: TOP_LEFT
              - label:
                  id: voltage_text
                  text_font: roboto_45
                  text: "00.00V"
                  text_color: 0xFFFFFF
                  align: BOTTOM_RIGHT
          - obj:
              styles: data_box
              align: TOP_LEFT
              width: 44%
              widgets:
              - label:
                  text_font: roboto_20
                  text: "Delta Cell Voltage"
                  text_color: 0x9C9C9C
                  align: TOP_LEFT
              - label:
                  id: delta_voltage_text
                  text_font: roboto_45
                  text: "0 mV"
                  text_color: 0xFFFFFF
                  align: BOTTOM_RIGHT
          - obj:
              styles: data_box
              align: TOP_LEFT
              widgets:
              - label:
                  text_font: roboto_20
                  text: "Charging Status"
                  text_color: 0x9C9C9C
                  align: TOP_LEFT
              - label:
                  id: charging_status_text
                  text_font: roboto_45
                  text: "Bulk"
                  text_color: 0xFFFFFF
                  align: BOTTOM_RIGHT
          - obj:
              styles: data_box
              align: TOP_LEFT
              widgets:
              - label:
                  text_font: roboto_20
                  text: "Battery Capacity"
                  text_color: 0x9C9C9C
                  align: TOP_LEFT
              - label:
                  id: capacity_text
                  text_font: roboto_45
                  text: "0 of 0Ah"
                  text_color: 0xFFFFFF
                  align: BOTTOM_RIGHT
          - obj:
              styles: data_box
              align: TOP_LEFT
              width: 44%
              widgets:
              - label:
                  text_font: roboto_20
                  text: "BMS Combined"
                  text_color: 0x9C9C9C
                  align: TOP_LEFT
              - label:
                  id: combined_bms_text
                  text_font: roboto_45
                  text: "0 of 0"
                  text_color: 0xFFFFFF
                  align: BOTTOM_RIGHT
          - obj:
              styles: data_box
              align: TOP_LEFT
              width: 44%
              widgets:
              - label:
                  text_font: roboto_20
                  text: "BMS Alarming"
                  text_color: 0x9C9C9C
                  align: TOP_LEFT
              - label:
                  id: bms_alarming_text
                  text_font: roboto_45
                  text: "0"
                  text_color: 0xFFFFFF
                  align: BOTTOM_RIGHT

      # Center column - native LVGL battery + SoC
      - obj:
          height: 700
          width: 280
          align: CENTER
          border_width: 0
          bg_opa: TRANSP
          pad_all: 4
          y: 30
          widgets:
          # SoC percentage text
          - label:
              align: TOP_MID
              id: soc_text
              text_font: roboto_75
              text: "0%"
              text_color: 0xFFFFFF
              y: 15
          # Battery terminal nub (+)
          - obj:
              x: 109
              y: 148
              width: 62
              height: 12
              bg_color: 0x9C9C9C
              border_width: 0
              radius: 2
              scrollbar_mode: "off"
          # Battery shell
          - obj:
              x: 46
              y: 160
              width: 188
              height: 400
              bg_color: 0x1A1A1A
              border_width: 3
              border_color: 0x9C9C9C
              radius: 8
              pad_all: 0
              scrollbar_mode: "off"
              widgets:
                # SoC fill bar — grows upward from bottom
                - obj:
                    id: battery_fill_soc
                    x: 0
                    y: 0
                    width: 100%
                    height: 0
                    bg_color: 0x00CC00
                    border_width: 0
                    radius: 4
                    align: BOTTOM_LEFT
                    scrollbar_mode: "off"

      # Right column - status + gauges
      - obj:
          height: 700
          width: 500
          align: RIGHT_MID
          border_width: 0
          pad_all: 0
          bg_opa: TRANSP
          bg_color: 0xFFFFFF
          layout:
            type: flex
            pad_row: 10
            flex_flow: ROW_WRAP
            flex_align_main: center
            flex_align_cross: start
            flex_align_track: center
          widgets:
          - obj:
              styles: data_box
              align: TOP_LEFT
              width: 44%
              widgets:
              - label:
                  text_font: roboto_20
                  text: "Discharging"
                  text_color: 0x9C9C9C
                  align: TOP_LEFT
              - label:
                  id: discharging_allowed_text
                  text_font: roboto_45
                  text: "Disabled"
                  text_color: 0xFFFFFF
                  align: BOTTOM_RIGHT
          - obj:
              styles: data_box
              align: TOP_LEFT
              width: 44%
              widgets:
              - label:
                  text_font: roboto_20
                  text: "Charging"
                  text_color: 0x9C9C9C
                  align: TOP_LEFT
              - label:
                  id: charging_allowed_text
                  text_font: roboto_45
                  text: "Disabled"
                  text_color: 0xFFFFFF
                  align: BOTTOM_RIGHT
          # Current gauge
          - obj:
              height: 210
              width: 90%
              border_width: 0
              bg_color: 0x393B3B
              pad_all: 10
              scrollbar_mode: "OFF"
              radius: 15
              align: CENTER
              widgets:
                - meter:
                    id: current_meter
                    styles: gauge_box
                    align: TOP_MID
                    scales:
                      - range_from: -400
                        range_to: 400
                        angle_range: 180
                        indicators:
                          - line:
                              id: current_needle
                              width: 5
                              r_mod: 25
                              value: 0
                              color: 0xFFFFFF
                          - arc:
                              color: 0xFF3000
                              r_mod: 10
                              width: 40
                              start_value: -400
                              end_value: 0
                          - arc:
                              color: 0x00FF00
                              r_mod: 10
                              width: 40
                              start_value: 0
                              end_value: 400
                - obj:
                    height: 140
                    width: 140
                    radius: 73
                    bg_color: 0x393B3B
                    align: CENTER
                    border_width: 0
                    pad_all: 0
                    y: 80
                - label:
                    id: current_text
                    text_font: roboto_45
                    align: CENTER
                    text_color: 0xFFFFFF
                    text: "0 A"
                    y: 70
                - label:
                    id: current_name
                    text_font: roboto_20
                    align: TOP_LEFT
                    text_color: 0x9C9C9C
                    text: "Current"
          # Power gauge
          - obj:
              height: 210
              width: 90%
              bg_color: 0x393B3B
              border_width: 0
              pad_all: 10
              scrollbar_mode: "OFF"
              radius: 15
              align: CENTER
              widgets:
                - meter:
                    id: power_meter
                    styles: gauge_box
                    align: TOP_MID
                    scales:
                      - range_from: -24
                        range_to: 24
                        angle_range: 180
                        indicators:
                          - line:
                              id: power_needle
                              width: 5
                              r_mod: 25
                              value: 0
                              color: 0xFFFFFF
                          - arc:
                              color: 0xFF3000
                              r_mod: 10
                              width: 40
                              start_value: -24
                              end_value: 0
                          - arc:
                              color: 0x00FF00
                              r_mod: 10
                              width: 40
                              start_value: 0
                              end_value: 24
                - obj:
                    height: 140
                    width: 140
                    radius: 73
                    align: CENTER
                    bg_color: 0x393B3B
                    border_width: 0
                    pad_all: 0
                    y: 80
                - label:
                    id: power_text
                    text_font: roboto_45
                    align: CENTER
                    text_color: 0xFFFFFF
                    text: "0.0 kW"
                    y: 70
                - label:
                    id: power_name
                    text_font: roboto_20
                    align: TOP_LEFT
                    text_color: 0x9C9C9C
                    text: "Power"

    - id: second_page

  top_layer:
    widgets:
      - buttonmatrix:
          align: bottom_mid
          pad_all: 0
          bg_opa: TRANSP
          border_opa: TRANSP
          outline_width: 0
          id: top_layer
          width: 60%
          height: 50
          items:
            styles: footer
          rows:
            - buttons:
              - id: page_prev
                text: "\uF053"
                on_press:
                  then:
                    lvgl.page.previous:
              - id: page_home
                text: "\uF015"
                on_press:
                  then:
                    lvgl.page.show: main_page
              - id: page_next
                text: "\uF054"
                on_press:
                  then:
                    lvgl.page.next:
      - obj:
          align: TOP_MID
          styles: header
          widgets:
            - label:
                text: "API"
                id: lbl_hastatus
                hidden: true
                align: top_right
                x: -25
                y: 10
                text_align: right
                text_font: roboto_20
                text_color: 0x13BF13
            - label:
                text: ""
                id: time_text
                align: center
                text_font: roboto_25
                text_color: 0xFFFFFF
            - label:
                id: lbl_INV
                x: 25
                y: 10
                align: top_left
                text_font: roboto_20
                text_align: left
                text: "INV"
                text_color: 0xBF1327
            - label:
                id: lbl_ESP
                x: 80
                y: 10
                align: top_left
                text_align: left
                text_font: roboto_20
                text: "ESP"
                text_color: 0x13BF13
