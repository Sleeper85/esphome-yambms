# +---------------------------------------------------------+
# | Color definitions (LVGL hex)                            |
# +---------------------------------------------------------+
substitutions:
  color_bg: '0x1a1a2e'    # dark navy
  color_panel: '0x16213e' # slightly lighter navy
  color_1: '0xffffff'     # white
  color_2: '0xb2bec3'     # grey
  color_3: '0x0f3460'     # blue
  color_4: '0x74b9ff'     # light_blue
  color_5: '0x00b894'     # green
  color_6: '0xfdcb6e'     # yellow
  color_7: '0xe17055'     # red

# +---------------------------------------------------------+
# | Fonts                                                   |
# +---------------------------------------------------------+
font:
  - file: "gfonts://Montserrat"
    id: font_14
    size: 14
    bpp: 4
  - file: "gfonts://Montserrat"
    id: font_18
    size: 18
    bpp: 4
    glyphs: "!\"%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~ °↑↓"
  - file: "gfonts://Montserrat"
    id: font_22
    size: 22
    bpp: 4
  - file: "gfonts://Montserrat"
    id: font_28
    size: 28
    bpp: 4
  - file: "gfonts://Montserrat"
    id: font_40
    size: 40
    bpp: 4

# +---------------------------------------------------------+
# | Display Timeout                                         |
# +---------------------------------------------------------+

number:
  - platform: template
    id: display_timeout
    device_id: ${board_id}
    name: "Display timeout"
    optimistic: true
    unit_of_measurement: "s"
    initial_value: 300
    restore_value: true
    min_value: 5
    max_value: 300
    step: 5
    mode: box
    entity_category: config

# +---------------------------------------------------------+
# | Touch Screen actions                                    |
# +---------------------------------------------------------+

touchscreen:
  - platform: gt911
    id: !extend my_touchscreen
    on_release: # when the finger leaves the screen surface
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: backlight

# +---------------------------------------------------------+
# | LVGL Configuration                                      |
# +---------------------------------------------------------+
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen

  on_idle:
    timeout: !lambda "return (id(display_timeout).state * 1000);"
    then:
      - light.turn_off: backlight
      - lvgl.pause:

  style_definitions:
    - id: footer
      bg_color: ${color_panel}
      bg_opa: COVER
      border_opa: TRANSP
      radius: 15
      opa: 80%
      pad_all: 0
      pad_row: 0
      pad_column: 0
      text_color: ${color_2}
      text_font: montserrat_26
      width: 60%
      height: 32

  # Global style defaults
  theme:
    label:
      text_color: ${color_1}
    obj:
      pad_all: 0
      scrollbar_mode: "off"

  top_layer:
    widgets:
      - buttonmatrix:
          id: top_layer
          align: bottom_mid
          y: -10
          pad_all: 0
          bg_opa: TRANSP
          border_opa: TRANSP
          outline_width: 0
          width: 60%
          height: 32
          items:
            styles: footer
          rows:
            - buttons:
              - id: page_prev
                text: "\uF053"
                on_press:
                  then:
                    lvgl.page.previous:
              - id: page_home
                text: "\uF015"
                on_press:
                  then:
                    lvgl.page.show: ${home_page}
              - id: page_next
                text: "\uF054"
                on_press:
                  then:
                    lvgl.page.next:
