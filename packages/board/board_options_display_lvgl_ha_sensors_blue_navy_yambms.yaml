text_sensor:

  - platform: homeassistant
    entity_id: sensor.${yambms_name}_charging_status
    id: ha_charging_status
    on_value:
      then:
      - lvgl.label.update:
          id: lbl_charging_status
          text: !lambda 'return x;'

  - platform: homeassistant
    entity_id: sensor.${yambms_name}_last_complete_charge
    id: ha_last_complete_charge
    on_value:
      then:
      - lvgl.label.update:
          id: lbl_last_charge
          text: !lambda 'return x;'

  - platform: homeassistant
    entity_id: sensor.${yambms_name}_alarm
    id: ha_alarm
    on_value:
      then:
      - lvgl.label.update:
          id: lbl_alarm
          text: !lambda 'return x;'
      - lambda: |-
          // Update bg_alarm based on alarm and warning status
          lv_color_t color;
          
          if (x != "NoAlarm" && x != "Warning") {
            color = lv_color_hex(${color_7});  // red if alarm
          } else if (id(ha_warning).state != "NoAlarm") {
            color = lv_color_hex(${color_6});  // yellow if warning
          } else {
            color = lv_color_hex(${color_5});  // green if all OK
          }
          
          lv_obj_set_style_bg_color(id(bg_alarm), color, 0);

  - platform: homeassistant
    entity_id: sensor.${yambms_name}_warning
    id: ha_warning
    on_value:
      then:
      - lvgl.label.update:
          id: lbl_warning
          text: !lambda 'return x;'
      - lambda: |-
          // Update bg_alarm based on alarm and warning status
          lv_color_t color;
          auto alarm = id(ha_alarm).state;
          if (alarm != "NoAlarm" && alarm != "Warning") {
            color = lv_color_hex(${color_7});  // red if alarm
          } else if (x != "NoAlarm") {
            color = lv_color_hex(${color_6});  // yellow if warning
          } else {
            color = lv_color_hex(${color_5});  // green if all OK
          }
          
          lv_obj_set_style_bg_color(id(bg_alarm), color, 0);

  - platform: homeassistant
    entity_id: sensor.${yambms_name}_charging_instruction
    id: ha_charging_instruction
    on_value:
      then:
      - lvgl.label.update:
          id: lbl_charge_instr
          text: !lambda 'return x;'
          text_color: !lambda |-
            if (x == "Stop") {
              return lv_color_hex(${color_7});  // red
            } else {
              return lv_color_hex(${color_4});  // light blue
            }
      - lvgl.label.update:
          id: lbl_cvl_instruction
          text: !lambda 'return x;'
          text_color: !lambda |-
            if (x == "Stop") {
              return lv_color_hex(${color_7});  // red
            } else {
              return lv_color_hex(${color_4});  // light blue
            }

  - platform: homeassistant
    entity_id: sensor.${yambms_name}_ccl_derating_reason
    id: ha_ccl_derating_reason
    on_value:
      then:
      - lvgl.label.update:
          id: lbl_ccl_derating_reason
          text: !lambda 'return x;'
      - lvgl.label.update:
          id: lbl_ccl_derating
          text: !lambda |-
            if (x == "No Derating") {
              return std::string("No Der.");
            } else {
              return std::string("Derating");
            }
          text_color: !lambda |-
            if (x == "No Derating") {
              return lv_color_hex(${color_4});  // light blue
            } else {
              return lv_color_hex(${color_7});  // red
            }

  - platform: homeassistant
    entity_id: sensor.${yambms_name}_dcl_derating_reason
    id: ha_dcl_derating_reason
    on_value:
      then:
      - lvgl.label.update:
          id: lbl_dcl_derating_reason
          text: !lambda 'return x;'
      - lvgl.label.update:
          id: lbl_dcl_derating
          text: !lambda |-
            if (x == "No Derating") {
              return std::string("No Der.");
            } else {
              return std::string("Derating");
            }
          text_color: !lambda |-
            if (x == "No Derating") {
              return lv_color_hex(${color_4});  // light blue
            } else {
              return lv_color_hex(${color_7});  // red
            }

  - platform: homeassistant
    entity_id: sensor.${device_name}_board_uptime
    id: ha_board_uptime
    on_value:
      then:
      - lvgl.label.update:
          id: lbl_uptime
          text: !lambda 'return x;'

  - platform: homeassistant
    entity_id: sensor.${device_name}_board_esphome_version
    id: ha_board_esphome_version
    on_value:
      then:
      - lvgl.label.update:
          id: lbl_esphome_ver
          text: !lambda 'return x.substr(0, 8);'

  - platform: homeassistant
    entity_id: sensor.${yambms_name}_running_version
    id: ha_running_version
    on_value:
      then:
      - lvgl.label.update:
          id: lbl_yambms_ver
          text: !lambda 'return x;'

  - platform: homeassistant
    entity_id: sensor.${device_name}_board_system_fault_data
    id: ha_sys_fault_data
    on_value:
      then:
      - lambda: |-
          // Parse JSON array: [[0],[0,0,0],[0],[],[0],[],[0],...]
          // Index: 0=API/MQTT, 1=BMS, 2=CAN, 3=RS485, 4=Shunt, 5=Bal, 6=Net
          
          // Manual parsing since root is an array
          if (x.empty() || x[0] != '[') {
            ESP_LOGE("fault", "Invalid JSON format");
            return;
          }
          
          // Helper to count faults in a device array
          auto count_faults = [](const std::string& json_str, int dev_idx) -> std::pair<int, int> {
            // Returns {nok_count, total_count}
            // Very simple parser - looks for [X,Y,Z] at device index
            
            int bracket_count = 0;
            int current_dev = -1;
            int nok = 0;
            int total = 0;
            bool in_array = false;
            
            for (size_t i = 0; i < json_str.length(); i++) {
              if (json_str[i] == '[') {
                bracket_count++;
                if (bracket_count == 2) {
                  current_dev++;
                  in_array = true;
                  nok = 0;
                  total = 0;
                }
              } else if (json_str[i] == ']') {
                bracket_count--;
                if (bracket_count == 1 && in_array && current_dev == dev_idx) {
                  return {nok, total};
                }
                in_array = false;
              } else if (in_array && current_dev == dev_idx && (json_str[i] == '0' || json_str[i] == '1')) {
                total++;
                if (json_str[i] == '1') nok++;
              }
            }
            
            return {-1, 0}; // device not found or empty
          };
          
          // Helper to determine color based on status
          auto get_status_color = [](int nok, int total) -> lv_color_t {
            if (nok == -1 || total == 0) {
              return lv_color_hex(${color_4}); // light blue = absent
            } else if (nok > 0) {
              return lv_color_hex(${color_7}); // red = NOK
            } else {
              return lv_color_hex(${color_5}); // green = OK
            }
          };
          
          // Update single device status
          auto update_device = [&](lv_obj_t* obj, int idx) {
            auto [nok, total] = count_faults(x, idx);
            lv_color_t color = get_status_color(nok, total);
            lv_obj_set_style_bg_color(obj, color, 0);
          };
          
          // Update all fault status widgets
          update_device(id(net_network), 6);      // Network
          update_device(id(net_api_mqtt), 0);     // API/MQTT
          update_device(id(net_can_inv), 2);      // CAN->INV
          update_device(id(net_rs485_inv), 3);    // RS485->INV
          update_device(id(bg_bms), 1);           // BMS
          update_device(id(bg_shunt), 4);         // Shunt
          update_device(id(bg_balancer), 5);      // Balancer

binary_sensor:
  - platform: homeassistant
    entity_id: binary_sensor.${yambms_name}_equalizing_state
    id: ha_equalizing_state
    trigger_on_initial_state: true
    on_state:
      then:
      - lvgl.label.update:
          id: lbl_equalizing
          text: !lambda 'return std::string("Equalizing: ") + (x ? "ON" : "OFF");'
          text_color: !lambda 'return x ? lv_color_hex(${color_6}) : lv_color_hex(${color_2});'

  - platform: homeassistant
    entity_id: binary_sensor.${yambms_name}_discharging_instruction
    id: ha_discharging_instruction
    trigger_on_initial_state: true
    on_state:
      then:
      - lvgl.label.update:
          id: lbl_discharge_instr
          text: !lambda 'return std::string(x ? "Allowed" : "Blocked");'
          text_color: !lambda 'return x ? lv_color_hex(${color_4}) : lv_color_hex(${color_7});'
      - lvgl.label.update:
          id: lbl_dvl_instruction
          text: !lambda 'return std::string(x ? "Allowed" : "Blocked");'
          text_color: !lambda 'return x ? lv_color_hex(${color_4}) : lv_color_hex(${color_7});'
