# AtomS3 - SKU:C123
# https://docs.m5stack.com/en/core/AtomS3

substitutions:
  board_chip: "ESP32-S3"
  board_name: "Atom S3"
  display_update_interval: "500ms"
  # Interfaces GPIOs
  # uart_esp_1           Grove port : CAN / RS485 unit
  tx_pin_1: '2'
  rx_pin_1: '1'
  # uart_esp_2
  tx_pin_2: '7'
  rx_pin_2: '8'
  # uart_esp_3           Atomic RS485 base
  tx_pin_3: '6'
  rx_pin_3: '5'
  # canbus_esp32_can     Atomic CAN base
  tx_pin_4: '5'
  rx_pin_4: '6'
  # canbus_mcp2515
  spi_mosi_pin: '7'
  spi_miso_pin: '8'
  spi_clk_pin: '38'
  mcp2515_cs_pin: '39'
  # talk_pin
  talk_pin: '8'

packages:
  device_base: !include ../base/device_base.yaml
  device_base_wifi: !include ../base/device_base_wifi.yaml
  no_led_control: !include board_options_no_led_control.yaml

esp32:
  variant: esp32s3
  cpu_frequency: 240MHz
  framework:
    type: esp-idf

esphome:
  platformio_options:
    board_build.flash_mode: dio # use Dual IO (dio) instead of Quad IO (qio) to prevent boot loop after flashing

wifi:
  id: my_network
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: !secret domain
  reboot_timeout: 0s

logger:
  baud_rate: 0 # frees the 3rd UART and avoids some bugs like "WK2168 with canbus" or "BLE client with RS485 modbus"
  hardware_uart: USB_SERIAL_JTAG

# +--------------------------------------+
# | Atom S3 related configuration        |
# +--------------------------------------+

spi:
  - id: atom_spi_bus
    clk_pin: 17
    mosi_pin: 21

binary_sensor:
  - platform: gpio
    id: atom_button
    pin:
      number: 41
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_off: 10ms
    on_press:
      then:
        - logger.log: Button Pressed
        - display.page.show_next: my_display
        #- display.page.show_previous: my_display

display:
  # Atom S3 display
  # Chipset: GC9107
  # Resolution : 128x128px
  # GC9107 is not listed among the native chips of mipi_spi (https://esphome.io/components/display/mipi_spi/).
  # This panel already worked using the ST7789V command set (former platform: st7789v, model: Custom),
  # as GC9107 is MIPI-DCS compatible with this register set (cf. M5GFX Panel_GC9107 / Tasmota board
  # autodetect, panel ID 0x079100). model: ST7789V is therefore kept to remain functionally identical.
  # https://esphome.io/components/display/mipi_spi/
  - platform: mipi_spi
    spi_id: atom_spi_bus
    id: my_display
    model: ST7789V
    cs_pin: 15
    dc_pin: 33
    reset_pin: 34
    dimensions:
      height: 128
      width: 128
      offset_height: 2
      offset_width: 1
      pad_height: 0
      pad_width: 0
    color_depth: 8
    update_interval: ${display_update_interval}
    data_rate: 40MHz
    init_sequence:
      # Additional SLPOUT command (0x11) after the standard ST7789V init sequence:
      # Replaces the old `on_boot` lambda
      - [0x11]

# The GC9107 backlight (GPIO16) is no longer handled natively by mipi_spi (no backlight_pin option):
# it is now driven via a separate PWM output + light, as for the other boards in this project.
# M5Stack recommends 500Hz for this PWM (a too-high frequency disrupts dimming).
output:
  - platform: ledc
    pin: 16
    id: backlight_pwm
    frequency: 500Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: back_light
    restore_mode: RESTORE_DEFAULT_ON
