switch:
  # Force Float switch
  - platform: template
    id: yambms${yambms_id}_switch_force_float
    device_id: yambms_yambms${yambms_id}
    name: "Force Float"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    entity_category: config
    turn_on_action:
      - globals.set:
          id: yambms${yambms_id}_var_force_float
          value: 'true'
    turn_off_action:
      - globals.set:
          id: yambms${yambms_id}_var_force_float
          value: 'false'
  # Update service switch
  - platform: template
    device_id: yambms_yambms${yambms_id}
    name: "Update service"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    entity_category: config
    turn_on_action:
      - globals.set:
          id: yambms${yambms_id}_var_service
          value: 'true'
    turn_off_action:
      - globals.set:
          id: yambms${yambms_id}_var_service
          value: 'false'

interval:
  # Change the min/max values of a silder
  - interval: 24h # It will be executed directly at startup and then every 24 hours
    then:
      - lambda: |-
          // Set min/max Float slider
          id(yambms${yambms_id}_float_voltage).traits.set_min_value(${yambms_cell_count} * 3.125);
          id(yambms${yambms_id}_float_voltage).traits.set_max_value(${yambms_cell_count} * 3.375);

          // Set min/max Inverter Offset Voltage slider
          id(yambms${yambms_id}_inverter_offset_v).traits.set_min_value(-3.0);
          id(yambms${yambms_id}_inverter_offset_v).traits.set_max_value(3.0);
