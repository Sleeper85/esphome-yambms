views:
  - title: YamBMS
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: YamBMS - Battery
          - graph: line
            type: sensor
            entity: sensor.yambms_1_total_voltage
            detail: 2
            layout_options:
              grid_columns: 2
              grid_rows: 2
            name: Voltage
            hours_to_show: 8
          - graph: line
            type: sensor
            entity: sensor.yambms_1_battery_soc
            detail: 2
            name: SoC
            hours_to_show: 8
          - type: gauge
            entity: sensor.yambms_1_current
            needle: true
            severity:
              green: 0
              yellow: -250
              red: -500
            max: 500
            min: -500
            name: Current
            layout_options:
              grid_columns: 2
              grid_rows: 3
          - type: gauge
            entity: sensor.yambms_1_power
            needle: true
            severity:
              green: 0
              yellow: -5000
              red: -10000
            max: 10000
            min: -10000
            name: Power
            layout_options:
              grid_columns: 2
              grid_rows: 3
          - type: tile
            entity: sensor.yambms_1_installed_battery_capacity
            name: Installed Battery Capacity
          - type: tile
            entity: sensor.yambms_1_battery_soh
            name: Battery SoH
          - type: tile
            entity: sensor.yambms_1_battery_capacity
            name: Battery Capacity
          - type: tile
            entity: sensor.yambms_1_capacity_remaining
            name: Capacity Remaining
          - type: tile
            entity: sensor.yambms_1_delta_cell_voltage
            name: Delta Cell Voltage
          - type: tile
            entity: binary_sensor.yambms_1_equalizing_state
            name: Equalizing state
          - type: entities
            entities:
              - entity: sensor.yambms_1_max_cell_voltage
                name: Max Cell V.
              - entity: sensor.yambms_1_max_voltage_cell
                name: Cell number
            layout_options:
              grid_columns: 2
              grid_rows: 2
          - type: entities
            entities:
              - entity: sensor.yambms_1_min_cell_voltage
                name: Min Cell V.
              - entity: sensor.yambms_1_min_voltage_cell
                name: Cell number
            layout_options:
              grid_columns: 2
              grid_rows: 2
          - type: entities
            entities:
              - entity: sensor.yambms_1_max_temperature
                name: Max temp.
              - entity: sensor.yambms_1_max_temperature_sensor
                name: Sensor number
            layout_options:
              grid_columns: 2
              grid_rows: 2
          - type: entities
            entities:
              - entity: sensor.yambms_1_min_temperature
                name: Min temp.
              - entity: sensor.yambms_1_min_temperature_sensor
                name: Sensor number
            layout_options:
              grid_columns: 2
              grid_rows: 2
        column_span: 1
      - type: grid
        cards:
          - type: heading
            heading: YamBMS - Status
          - type: tile
            entity: binary_sensor.yambms_1_inverter_communication_status
            name: Inverter comm. status
          - type: tile
            entity: binary_sensor.yambms_board_online_status
            name: Board status
          - type: tile
            entity: sensor.yambms_1_charging_status
            name: Charging Status
          - type: tile
            entity: sensor.yambms_1_last_complete_charge
            name: Last Complete Charge
          - type: tile
            entity: sensor.yambms_1_charging_instruction
            name: Charging Instruction
          - type: tile
            entity: binary_sensor.yambms_1_discharging_instruction
            name: Discharging Instruction
          - type: tile
            entity: sensor.yambms_1_alarm
            name: Alarm
          - type: tile
            entity: sensor.yambms_1_warning
            name: Warning
          - type: entities
            entities:
              - entity: sensor.yambms_1_bms_count
                name: BMS count
              - entity: sensor.yambms_1_bms_combined
                name: BMS combined
              - entity: sensor.yambms_1_bms_blocking_charge
                name: BMS blocking charge
              - entity: sensor.yambms_1_bms_blocking_discharge
                name: BMS blocking discharge
              - entity: sensor.yambms_1_bms_in_alarm
                name: BMS in alarm
            layout_options:
              grid_columns: 2
              grid_rows: 4
          - type: entities
            entities:
              - entity: sensor.yambms_1_shunt_count
                name: Shunt count
              - entity: sensor.yambms_1_shunt_combined
                name: Shunt combined
            grid_options:
              columns: 6
              rows: 4
          - type: entities
            entities:
              - entity: sensor.yambms_1_requested_charge_voltage
                name: Requested Charge Voltage
              - entity: sensor.yambms_1_requested_charge_current
                name: Requested Charge Current
              - entity: sensor.yambms_1_requested_discharge_voltage
                name: Requested Discharge Voltage
              - entity: sensor.yambms_1_requested_discharge_current
                name: Requested Discharge Current
              - entity: binary_sensor.yambms_1_requested_force_charge
                name: Requested Force Charge
        column_span: 1
      - type: grid
        cards:
          - type: heading
            heading: YamBMS - Overview
            heading_style: title
          - type: markdown
            content: |-
              {% set on = '<font color="#4CAF50"><b>ON</b></font>' %}
              {% set off = '<font color="#9e9e9e">OFF</font>' %}
              <table>
                <tr>
                  <td>CCL Derating Reason</td>
                  <td>{% set v = states('sensor.yambms_1_ccl_derating_reason') %}{% if v == 'No Derating' %}<font color="#4CAF50">{{ v }}</font>{% else %}<font color="#FFC107">{{ v }}</font>{% endif %} — {{ states('sensor.yambms_1_requested_charge_current')|float|round }} A</td>
                </tr>
                <tr>
                  <td>DCL Derating Reason</td>
                  <td>{% set v = states('sensor.yambms_1_dcl_derating_reason') %}{% if v == 'No Derating' %}<font color="#4CAF50">{{ v }}</font>{% else %}<font color="#FFC107">{{ v }}</font>{% endif %} — {{ states('sensor.yambms_1_requested_discharge_current')|float|round }} A</td>
                </tr>
                {% if is_state('switch.yambms_1_temperature_based_current_limitation','on') %}
                <tr>
                  <td>Temp. Based Current Limit</td>
                  <td>{{ on }}</td>
                </tr>
                {% endif %}
                {% if is_state('switch.yambms_1_automatic_charge_voltage','on') %}
                <tr>
                  <td>Automatic Charge Voltage</td>
                  <td>{{ on }}</td>
                </tr>
                {% endif %}
                {% if is_state('switch.yambms_1_automatic_charge_current','on') %}
                <tr>
                  <td>Automatic Charge Current</td>
                  <td>{{ on }}</td>
                </tr>
                {% endif %}
                {% if is_state('switch.yambms_1_automatic_discharge_current','on') %}
                <tr>
                  <td>Automatic Discharge Current</td>
                  <td>{{ on }}</td>
                </tr>
                {% endif %}
                {% if is_state('switch.yambms_1_automatic_eoc_current','on') %}
                <tr>
                  <td>Automatic EOC Current</td>
                  <td>{% set eoc_status = states('sensor.yambms_1_auto_eoc_status') %}{% set eoc_val %}{{ states('number.yambms_1_auto_eoc_target_hour') | int }}:{{ '%02d' % (states('number.yambms_1_auto_eoc_target_minute') | int) }} — {{ eoc_status }}{% endset %}{% if eoc_status.startswith('Stop:') %}<font color="#FFC107">{{ eoc_val }}</font>{% elif eoc_status.startswith('Run') %}<font color="#4CAF50">{{ eoc_val }}</font>{% else %}{{ eoc_val }}{% endif %}</td>
                </tr>
                {% endif %}
                {% if is_state('switch.yambms_1_automatic_soc_limit','on') %}
                <tr>
                  <td>Automatic SoC Limit</td>
                  <td>{% set soc_status = states('sensor.yambms_1_auto_soc_limit_status') %}{% if soc_status.startswith('Stop:') %}<font color="#FFC107">{{ states('number.yambms_1_auto_soc_limit') }} % — {{ soc_status }}</font>{% elif soc_status == 'Run' %}<font color="#4CAF50">{{ states('number.yambms_1_auto_soc_limit') }} % — {{ soc_status }}</font>{% else %}{{ states('number.yambms_1_auto_soc_limit') }} % — {{ soc_status }}{% endif %}</td>
                </tr>
                {% endif %}
                {% set rebulk_days = states('number.yambms_1_rebulk_days') | int %}
                {% if rebulk_days != 0 %}
                <tr>
                  <td>Rebulk Days</td>
                  <td>{% set last = strptime(states('sensor.yambms_1_last_complete_charge') | trim, '%H:%M %d %b %Y') %}{% set remaining = (last.date() + timedelta(days=rebulk_days) - now().date()).days %}{{ rebulk_days }} days — {% if remaining < 0 %}<font color="#F44336">{{ remaining | abs }} overdue</font>{% elif remaining == 0 %}<font color="#F44336">{{ remaining }} remaining</font>{% elif remaining <= 2 %}<font color="#FFC107">{{ remaining }} remaining</font>{% else %}<font color="#4CAF50">{{ remaining }} remaining</font>{% endif %}</td>
                </tr>
                {% endif %}
                <tr>
                  <td>Rebulk SoC</td>
                  <td>{{ states('number.yambms_1_rebulk_soc')|float|round }} %</td>
                </tr>
                <tr>
                  <td>Rebulk Voltage</td>
                  <td>{{ states('number.yambms_1_rebulk_v')|float|round(2) }} V</td>
                </tr>
                </table>
          - type: heading
            heading: YamBMS - Diagnostic
            heading_style: title
          - type: markdown
            content: |2
                <table>
                <tr>
                  <td>Uptime</td>
                  <td>{{ states('sensor.yambms_board_uptime') }}</td>
                </tr>
                <tr>
                  <td>Loop Time</td>
                  <td>{{ states('sensor.yambms_board_debug_loop_time')|float|round }} ms</td>
                </tr>
                  <tr>
                  <td>Heap Free Memory</td>
                  <td>{{ states('sensor.yambms_board_debug_heap_free_percent')|float|round }} %</td>
                </tr>
                <tr>
                  <td>YamBMS Running version</td>
                  <td>{{ states('sensor.yambms_1_running_version') }}</td>
                </tr>
                <tr>
                  <td>YamBMS Last version</td>
                  <td>{{ states('sensor.yambms_1_last_version') }}</td>
                </tr>
                <tr>
                  <td>ESPHome Version</td>
                  <td>{{ states('sensor.yambms_board_esphome_version')[:8] }}</td>
                </tr>
              </table>
